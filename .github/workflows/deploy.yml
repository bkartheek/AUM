name: Deploy Documentation Portal

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install and Build 🔧
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate static docs JSON data
        run: node scripts/parse_docs.js

      - name: Build React Vite SPA
        run: |
          cd docs_portal
          if ! npm install --legacy-peer-deps --no-audit --no-fund > build.log 2>&1; then
            cat build.log
            exit 1
          fi
          if ! npm run build > build.log 2>&1; then
            cat build.log
            exit 1
          fi

      - name: Commit Logs on Failure
        if: failure()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p debug_logs
          cp docs_portal/build.log debug_logs/build.log
          git add debug_logs/build.log
          git commit -m "debug: add build failure log [skip ci]" || true
          git push origin main || true

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs_portal/dist
          branch: gh-pages
