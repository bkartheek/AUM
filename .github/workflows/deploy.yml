name: Deploy Documentation Portal

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install and Build 🔧
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate static docs JSON data
        run: node scripts/parse_docs.js

      - name: Build React Vite SPA
        run: |
          cd docs_portal
          npm install --no-audit --no-fund
          npm run build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs_portal/dist
          branch: gh-pages
