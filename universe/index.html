<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cosmic Universe Explorer</title>
  <!-- Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div id="glow-container">
    <div class="glow-orb top-left"></div>
    <div class="glow-orb bottom-right"></div>
  </div>

  <div class="universe-container">
    <header class="universe-header">
      <span class="universe-badge">Cosmic Order (Ṛta)</span>
      <h1 class="universe-title">Project Universe</h1>
      <p class="universe-subtitle">
        An interactive exploration of astronomical metrics and cosmic bodies, built within the constraints of the AUM engine.
      </p>
    </header>

    <!-- Controls -->
    <section class="universe-controls">
      <div class="search-box">
        <input type="text" id="search-input" placeholder="Search cosmic bodies or parameters...">
      </div>
      <div class="filter-tabs">
        <button class="filter-tab active" data-type="all">All Bodies</button>
        <button class="filter-tab" data-type="planet">Planets</button>
        <button class="filter-tab" data-type="star">Stars</button>
        <button class="filter-tab" data-type="nebula">Nebulae</button>
      </div>
    </section>

    <!-- Content Grid -->
    <main class="universe-grid" id="universe-grid">
      <!-- Generated by app.js -->
    </main>

    <footer class="universe-footer">
      <p>© 2026 Project Universe. Anchored in the Immutable Brahman.</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
