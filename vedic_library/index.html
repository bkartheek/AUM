<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vedic Library: Interactive Śruti Explorer</title>
  <!-- Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
  <!-- Stylesheets -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div id="glow-container">
    <div class="glow-orb top-left"></div>
    <div class="glow-orb bottom-right"></div>
  </div>

  <div class="vedic-container">
    <header class="vedic-header">
      <span class="vedic-badge">ॐ Śruti Auditory Archive</span>
      <h1 class="vedic-title">The Interactive Vedic Library</h1>
      <p class="vedic-subtitle">
        Explore select sacred text recordings and translations from the four primary Vedas. Click 'Listen' to trigger the auditory pronunciation simulator.
      </p>
    </header>

    <!-- Search & Filter Controls -->
    <section class="vedic-controls">
      <div class="search-box">
        <input type="text" id="search-input" placeholder="Search mantras or translation keywords...">
      </div>
      <div class="filter-tabs">
        <button class="filter-tab active" data-veda="all">All Vedas</button>
        <button class="filter-tab" data-veda="rigveda">Rigveda</button>
        <button class="filter-tab" data-veda="yajurveda">Yajurveda</button>
        <button class="filter-tab" data-veda="samaveda">Samaveda</button>
        <button class="filter-tab" data-veda="atharvaveda">Atharvaveda</button>
      </div>
    </section>

    <!-- Mantra Display Grid -->
    <main class="vedic-grid" id="mantra-grid">
      <!-- Dynamically generated by app.js -->
    </main>

    <footer class="vedic-footer">
      <p>© 2026 AUM Vedic Cognitive Framework. Anchored in Śruti Spoken Wisdom.</p>
    </footer>
  </div>

  <!-- JavaScript -->
  <script src="app.js"></script>
</body>
</html>
